<style>
:root{--bg:#0a0a0a;--bubble-in:#161616;--text:#f0f0f0;--muted:#555;--radius:4px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}

.topbar{width:100%;max-width:680px;background:#111;border-bottom:1px solid #1e1e1e;padding:12px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo-wrap{height:38px;display:flex;align-items:center;}
.logo-wrap img{height:100%;width:auto;object-fit:contain;filter:brightness(0) invert(1);}
.topbar-div{width:1px;height:26px;background:#2a2a2a;flex-shrink:0;}
.topbar-info h2{font-family:Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;letter-spacing:.12em;color:#bbb;text-transform:uppercase;}
.topbar-info p{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}

.prog-wrap{width:100%;max-width:680px;background:#0d0d0d;padding:9px 20px;border-bottom:1px solid #1a1a1a;position:sticky;top:63px;z-index:99;}
.prog-label{font-size:9px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase;}
.prog-track{height:1px;background:#222;}
.prog-fill{height:100%;background:#fff;transition:width .4s ease;}

.main{width:100%;max-width:680px;flex:1;padding:28px 16px 100px;display:flex;flex-direction:column;gap:0;}

/* QUESTION CARD */
.q-card{background:#111;border:1px solid #1e1e1e;border-radius:var(--radius);padding:24px 20px;display:flex;flex-direction:column;gap:16px;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.q-section{font-size:9px;letter-spacing:.2em;color:#444;text-transform:uppercase;margin-bottom:2px;}
.q-text{font-size:16px;color:#ddd;line-height:1.6;font-weight:300;letter-spacing:.01em;}
.q-text strong{color:#fff;font-weight:600;}

/* OPTIONS */
.opts{display:flex;flex-wrap:wrap;gap:8px;}
.opt{padding:10px 18px;border-radius:var(--radius);border:1px solid #2a2a2a;background:transparent;color:#888;font-family:Helvetica,Arial,sans-serif;font-size:13px;cursor:pointer;transition:all .15s;letter-spacing:.02em;text-align:left;}
.opt:hover{border-color:#888;color:#ddd;}
.opt.sel{background:#fff;color:#000;border-color:#fff;font-weight:700;}
.opt.msel{background:#1c1c1c;color:#fff;border-color:#666;}
.opt.other-btn{border-style:dashed;color:#555;border-color:#333;}
.opt.other-btn:hover{border-color:#666;color:#999;}

/* TEXT INPUT */
.q-textarea{background:#0e0e0e;border:1px solid #2a2a2a;border-radius:var(--radius);padding:12px 14px;color:#fff;font-family:Helvetica,Arial,sans-serif;font-size:14px;resize:none;outline:none;width:100%;min-height:48px;max-height:140px;line-height:1.55;transition:border-color .2s;}
.q-textarea:focus{border-color:#555;}
.q-textarea::placeholder{color:#333;}
.q-textarea.hidden{display:none;}

/* NAV */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.nav-btn{padding:10px 24px;border-radius:var(--radius);border:1px solid #2a2a2a;background:transparent;color:#666;font-family:Helvetica,Arial,sans-serif;font-size:13px;cursor:pointer;transition:all .15s;letter-spacing:.06em;}
.nav-btn:hover:not(:disabled){border-color:#888;color:#ddd;}
.nav-btn.next{border-color:#fff;background:#fff;color:#000;font-weight:700;}
.nav-btn.next:hover{background:#ddd;}
.nav-btn:disabled{opacity:.25;cursor:default;}
.nav-step{font-size:10px;color:#333;letter-spacing:.06em;}

/* ACTIONS */
.action-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px 0 8px;width:100%;}
.pdf-btn{padding:15px 48px;border-radius:var(--radius);border:1px solid #fff;background:#fff;color:#000;font-family:Helvetica,Arial,sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.14em;transition:all .18s;text-transform:uppercase;}
.pdf-btn:hover{background:#000;color:#fff;}
.pdf-btn:disabled{background:#2a2a2a;border-color:#2a2a2a;color:#555;cursor:default;}
.wpp-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.wpp-btn{padding:11px 22px;border-radius:var(--radius);border:1px solid #25d366;background:transparent;color:#25d366;font-family:Helvetica,Arial,sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.06em;transition:all .18s;text-decoration:none;display:inline-block;text-align:center;}
.wpp-btn:hover{background:#25d366;color:#000;}
.status-msg{font-size:12px;color:var(--muted);letter-spacing:.04em;text-align:center;padding:0 20px;}
.status-msg.ok{color:#4caf50;}.status-msg.err{color:#e55;}
.finish-title{font-size:18px;color:#fff;font-weight:300;letter-spacing:.08em;text-align:center;}
.finish-sub{font-size:12px;color:#444;letter-spacing:.06em;text-align:center;}
</style>
</head>

const TOTAL = QUESTIONS.length;
let step = 0;
let answers = {};
let multiTemp = {};

function fmtLabel(t){ return t; }
function updateProgress(){
  const pct = Math.round((step/TOTAL)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-label').textContent = QUESTIONS[Math.min(step,TOTAL-1)]?.section || 'Concluído';
}

function renderStep(){
  if(step >= TOTAL){ renderFinish(); return; }
  const q = QUESTIONS[step];
  const main = document.getElementById('main');
  main.innerHTML = '';
  updateProgress();

  const card = document.createElement('div');
  card.className = 'q-card';

  // Section label
  if(q.section){
    const sec = document.createElement('div');
    sec.className = 'q-section';
    sec.textContent = q.section;
    card.appendChild(sec);
  }

  // Question text
  const qt = document.createElement('div');
  qt.className = 'q-text';
  qt.innerHTML = q.q;
  card.appendChild(qt);

  // Answer area
  if(q.type === 'text'){
    const ta = document.createElement('textarea');
    ta.className = 'q-textarea';
    ta.placeholder = 'Digite aqui...';
    ta.rows = 2;
    ta.value = answers[q.key] || '';
    ta.addEventListener('input', ()=>{ ta.style.height=''; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; });
    card.appendChild(ta);

    const nav = makeNav(
      ()=> { answers[q.key] = ta.value.trim(); },
      ()=> ta.value.trim().length > 0,
      q.key, ta
    );
    card.appendChild(nav);

  } else if(q.type === 'single'){
    const saved = answers[q.key];
    const optsDiv = document.createElement('div');
    optsDiv.className = 'opts';

    let selectedOpt = null;
    let otherActive = false;

    const ta = document.createElement('textarea');
    ta.className = 'q-textarea hidden';
    ta.placeholder = 'Digite sua resposta...';
    ta.rows = 2;
    ta.addEventListener('input', ()=>{ ta.style.height=''; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; });

    const makeOptBtn = (label) => {
      const b = document.createElement('button');
      b.className = 'opt';
      b.textContent = label;
      if(saved === label){ b.classList.add('sel'); selectedOpt = b; }
      b.onclick = ()=>{
        if(selectedOpt) selectedOpt.classList.remove('sel');
        if(otherBtn) otherBtn.classList.remove('sel');
        b.classList.add('sel');
        selectedOpt = b;
        otherActive = false;
        ta.classList.add('hidden');
      };
      return b;
    };

    q.opts.forEach(o => optsDiv.appendChild(makeOptBtn(o)));

    // "Outra resposta" button
    const otherBtn = document.createElement('button');
    otherBtn.className = 'opt other-btn';
    otherBtn.textContent = '+ Outra resposta';
    // if saved value is not in opts list, it was a custom answer
    const isCustom = saved && !q.opts.includes(saved);
    if(isCustom){ otherBtn.classList.add('sel'); ta.classList.remove('hidden'); ta.value = saved; otherActive = true; }
    otherBtn.onclick = ()=>{
      if(selectedOpt){ selectedOpt.classList.remove('sel'); selectedOpt = null; }
      otherBtn.classList.add('sel');
      otherActive = true;
      ta.classList.remove('hidden');
      ta.focus();
    };
    optsDiv.appendChild(otherBtn);
    card.appendChild(optsDiv);
    card.appendChild(ta);

    const getVal = ()=> otherActive ? ta.value.trim() : (selectedOpt ? selectedOpt.textContent : '');
    const isValid = ()=> otherActive ? ta.value.trim().length > 0 : selectedOpt !== null;

    const nav = makeNav(()=>{ answers[q.key] = getVal(); }, isValid, q.key);
    card.appendChild(nav);

  } else if(q.type === 'multi'){
    if(!multiTemp[q.key]) multiTemp[q.key] = answers[q.key] ? answers[q.key].split(', ') : [];
    const saved = multiTemp[q.key];

    const optsDiv = document.createElement('div');
    optsDiv.className = 'opts';

    const ta = document.createElement('textarea');
    ta.className = 'q-textarea hidden';
    ta.placeholder = 'Digite itens adicionais...';
    ta.rows = 2;
    ta.addEventListener('input',()=>{ ta.style.height=''; ta.style.height=Math.min(ta.scrollHeight,140)+'px'; });

    let otherActive = false;
    let otherBtn;

    q.opts.forEach(o=>{
      const b = document.createElement('button');
      b.className = 'opt msel-target';
      b.textContent = o;
      if(saved.includes(o)) b.classList.add('msel');
      b.onclick = ()=>{
        b.classList.toggle('msel');
        if(b.classList.contains('msel')){ if(!multiTemp[q.key].includes(o)) multiTemp[q.key].push(o); }
        else { multiTemp[q.key] = multiTemp[q.key].filter(x=>x!==o); }
      };
      optsDiv.appendChild(b);
    });

    otherBtn = document.createElement('button');
    otherBtn.className = 'opt other-btn';
    otherBtn.textContent = '+ Outra opção';
    const customVal = saved.find(s=>!q.opts.includes(s));
    if(customVal){ otherBtn.classList.add('msel'); ta.classList.remove('hidden'); ta.value = customVal; otherActive = true; }
    otherBtn.onclick = ()=>{
      otherActive = !otherActive;
      otherBtn.classList.toggle('msel', otherActive);
      ta.classList.toggle('hidden', !otherActive);
      if(otherActive) ta.focus();
    };
    optsDiv.appendChild(otherBtn);
    card.appendChild(optsDiv);
    card.appendChild(ta);

    const getVal = ()=>{
      const base = [...multiTemp[q.key]];
      if(otherActive && ta.value.trim()) base.push(ta.value.trim());
      return base.length ? base.join(', ') : 'Nenhum';
    };

    const nav = makeNav(()=>{ answers[q.key] = getVal(); }, ()=>true, q.key);
    card.appendChild(nav);
  }

  main.appendChild(card);
  window.scrollTo({top:0, behavior:'smooth'});
}

function makeNav(onNext, isValid, key){
  const row = document.createElement('div');
  row.className = 'nav-row';

  const back = document.createElement('button');
  back.className = 'nav-btn';
  back.textContent = '← Voltar';
  back.disabled = step === 0;
  back.onclick = ()=>{ step--; renderStep(); };

  const counter = document.createElement('span');
  counter.className = 'nav-step';
  counter.textContent = `${step+1} / ${TOTAL}`;

  const next = document.createElement('button');
  next.className = 'nav-btn next';
  next.textContent = step === TOTAL-1 ? 'Concluir ✓' : 'Avançar →';
  next.onclick = ()=>{
    if(!isValid()){ next.style.animation='shake .3s'; setTimeout(()=>next.style.animation='',300); return; }
    onNext();
    step++;
    renderStep();
  };

  row.appendChild(back);
  row.appendChild(counter);
  row.appendChild(next);
  return row;
}

function renderFinish(){
  updateProgress();
  const main = document.getElementById('main');
  main.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'action-wrap';

  const title = document.createElement('div');
  title.className = 'finish-title';
  title.textContent = 'Briefing concluído';

  const sub = document.createElement('div');
  sub.className = 'finish-sub';
  sub.textContent = 'Clique abaixo para gerar e enviar o PDF';

  const btn = document.createElement('button');
  btn.className = 'pdf-btn';
  btn.textContent = 'GERAR E ENVIAR PDF';
  btn.onclick = ()=> generateAndSend(btn, status);

  const status = document.createElement('p');
  status.className = 'status-msg';

  wrap.appendChild(title);
  wrap.appendChild(sub);
  wrap.appendChild(btn);
  wrap.appendChild(status);
  main.appendChild(wrap);
  window.scrollTo({top:0,behavior:'smooth'});
}

async function generateAndSend(btn, statusEl){
  btn.disabled = true;
  btn.textContent = 'GERANDO PDF...';
  statusEl.textContent = 'Aguarde...';

  const doc = new jsPDF({unit:'mm', format:'a4'});
  const W=210, M=18, cW=W-M*2;
  let y=0;

  // Calcula proporção real da logo para não distorcer
  const logoImg = new Image();
  logoImg.src = LOGO;
  await new Promise(r=>{ logoImg.onload=r; logoImg.onerror=r; });
  const logoNatW = logoImg.naturalWidth||303;
  const logoNatH = logoImg.naturalHeight||64;
  const logoH = 14; // altura fixa no header
  const logoW = (logoNatW/logoNatH)*logoH; // largura proporcional

  function drawFtr(pg){
    doc.setFillColor(0,0,0); doc.rect(0,282,W,15,'F');
    const fLogoH=7, fLogoW=(logoNatW/logoNatH)*fLogoH;
    try{ doc.addImage(LOGO,'PNG',M,285,fLogoW,fLogoH,'','FAST'); }catch(e){}
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(100,100,100);
    doc.text(`Briefing Inicial — Uso Interno | ${new Date().toLocaleDateString('pt-BR')}`, M+fLogoW+4, 290);
    doc.text(`Pág. ${pg}`, W-M, 290, {align:'right'});
  }
  function chk(h=16){ if(y+h>272){ drawFtr(doc.internal.getNumberOfPages()); doc.addPage(); y=20; } }

  // HEADER
  doc.setFillColor(0,0,0); doc.rect(0,0,W,48,'F');
  try{ doc.addImage(LOGO,'PNG',M,17,logoW,logoH,'','FAST'); }catch(e){}
  const lx = M+logoW+10;
  doc.setDrawColor(255,255,255); doc.setLineWidth(0.3); doc.line(lx,12,lx,36);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text('BRIEFING INICIAL', lx+6, 21);
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(255,255,255);
  doc.text('PROJETO DE ARQUITETURA', lx+6, 29);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(110,110,110);
  doc.text(`${answers['nome_clientes']||'—'}   ·   ${answers['data']||'—'}`, lx+6, 37);
  doc.setFillColor(255,255,255); doc.rect(0,48,W,0.4,'F');
  y=60;

  // Group questions by section
  const sections=[];
  let cur=null;
  QUESTIONS.forEach(q=>{
    if(q.section){ cur={title:q.section,keys:[]}; sections.push(cur); }
    if(cur) cur.keys.push(q);
  });

  sections.forEach((sec,si)=>{
    chk(14);
    doc.setFillColor(0,0,0); doc.rect(M,y,cW,7,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
    doc.text(`${String(si+1).padStart(2,'0')} — ${sec.title.toUpperCase()}`, M+3, y+5);
    y+=10;

    sec.keys.forEach(({key,q},i)=>{
      const raw = answers[key]||'—';
      // label: strip HTML tags
      const label = q.replace(/<[^>]+>/g,'').replace(/\?/g,'').trim().substring(0,38);
      const lines = doc.splitTextToSize(raw, cW-52);
      const rh = Math.max(7, lines.length*5.5+2);
      chk(rh+1);
      if(i%2===0){ doc.setFillColor(246,246,246); doc.rect(M,y-1,cW,rh+1,'F'); }
      doc.setDrawColor(225,225,225); doc.rect(M,y-1,cW,rh+1,'S');
      doc.setFont('helvetica','bold'); doc.setFontSize(7); doc.setTextColor(130,130,130);
      doc.text(label, M+2, y+4.5);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(0,0,0);
      doc.text(lines, M+52, y+4.5);
      y+=rh+1;
    });
    y+=5;
  });

  drawFtr(doc.internal.getNumberOfPages());

  const nome = (answers['nome_clientes']||'cliente').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  const data = (answers['data']||'').replace(/\//g,'-');
  const fileName = `briefing_${nome}_${data}.pdf`;
  doc.save(fileName);

  // EMAIL
  btn.textContent='ENVIANDO E-MAIL...';
  const resumo = QUESTIONS.map(q=>{ const l=q.q.replace(/<[^>]+>/g,'').trim(); return `${l}: ${answers[q.key]||'—'}`; }).join('\n');
  try{
    await emailjs.send('service_9jmmcyy','template_a3ph1h4',{
      to_email:'contato@cantagaloarquitetos.com',
      cliente_nome: answers['nome_clientes']||'—',
      data_preenchimento: answers['data']||'—',
      resumo_respostas: resumo,
      pdf_base64: doc.output('datauristring').split(',')[1],
      pdf_nome: fileName,
    });
    statusEl.className='status-msg ok';
    statusEl.textContent='✓ E-mail enviado para contato@cantagaloarquitetos.com';
    btn.textContent='ENVIADO ✓';
  }catch(err){
    console.error(err);
    statusEl.className='status-msg err';
    statusEl.textContent='⚠ Erro no envio do e-mail. PDF salvo localmente.';
    btn.textContent='GERAR E ENVIAR PDF';
    btn.disabled=false;
  }

  // WHATSAPP BUTTONS
  setTimeout(()=>{
    const msg = encodeURIComponent(
      `📋 *Novo Briefing Recebido*\n\n*Cliente:* ${answers['nome_clientes']||'—'}\n*Data:* ${answers['data']||'—'}\n*Imóvel:* ${answers['endereco_imovel']||'—'}\n\nO PDF foi enviado para contato@cantagaloarquitetos.com`
    );
    const wRow = document.createElement('div'); wRow.className='wpp-row';
    const w1=document.createElement('a'); w1.className='wpp-btn';
    w1.href=`https://wa.me/5521996322199?text=${msg}`; w1.target='_blank'; w1.textContent='📱 WhatsApp 1';
    const w2=document.createElement('a'); w2.className='wpp-btn';
    w2.href=`https://wa.me/5521998565060?text=${msg}`; w2.target='_blank'; w2.textContent='📱 WhatsApp 2';
    wRow.appendChild(w1); wRow.appendChild(w2);
    document.getElementById('main').appendChild(wRow);
  },1200);
}

window.onload=()=>{
  emailjs.init('JmOy-E_prRqiNaHW4');
  renderStep();
};
