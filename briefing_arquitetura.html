<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefing Inicial – Projeto de Arquitetura</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --bubble-out: #222222;
    --bubble-in: #181818;
    --text: #f0f0f0;
    --muted: #555555;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

  .topbar { width: 100%; max-width: 680px; background: #111; border-bottom: 1px solid #1e1e1e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo-wrap { height: 42px; display: flex; align-items: center; }
  .logo-wrap img { height: 100%; width: auto; object-fit: contain; filter: brightness(0) invert(1); }
  .topbar-divider { width: 1px; height: 30px; background: #2a2a2a; }
  .topbar-info h2 { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 400; letter-spacing: 0.06em; color: #ccc; }
  .topbar-info p { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

  .progress-bar-wrap { width: 100%; max-width: 680px; background: #0d0d0d; padding: 10px 20px; border-bottom: 1px solid #1a1a1a; position: sticky; top: 67px; z-index: 99; }
  .progress-label { font-size: 10px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .progress-track { height: 1px; background: #222; }
  .progress-fill { height: 100%; background: #fff; transition: width 0.5s ease; }

  .chat-area { width: 100%; max-width: 680px; flex: 1; padding: 24px 16px 140px; display: flex; flex-direction: column; gap: 10px; }

  .msg { display: flex; flex-direction: column; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-end; }

  .bubble { max-width: 82%; padding: 11px 16px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; }
  .msg.bot .bubble { background: var(--bubble-in); border: 1px solid #222; border-top-left-radius: 4px; color: #ccc; }
  .msg.user .bubble { background: var(--bubble-out); border: 1px solid #2e2e2e; border-top-right-radius: 4px; color: #fff; }
  .bubble strong { color: #fff; }
  .time { font-size: 10px; color: #333; margin-top: 3px; padding: 0 4px; }

  .section-divider { text-align: center; font-size: 9px; font-weight: 600; letter-spacing: 0.16em; color: #3a3a3a; border-top: 1px solid #1c1c1c; border-bottom: 1px solid #1c1c1c; padding: 6px 14px; align-self: center; text-transform: uppercase; width: 100%; background: #0c0c0c; margin: 6px 0; }

  .options { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 8px; max-width: 86%; }
  .opt-btn { padding: 8px 18px; border-radius: 2px; border: 1px solid #2e2e2e; background: transparent; color: #888; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
  .opt-btn:hover { border-color: #aaa; color: #eee; }
  .opt-btn.selected { background: #fff; color: #000; border-color: #fff; font-weight: 600; }
  .opt-btn.multi.selected { background: #1e1e1e; color: #fff; border-color: #888; }
  .confirm-btn { padding: 9px 24px; border-radius: 2px; border: 1px solid #fff; background: #fff; color: #000; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.15s; margin-top: 4px; letter-spacing: 0.05em; }
  .confirm-btn:hover { background: #ddd; }

  .input-area { position: fixed; bottom: 0; width: 100%; max-width: 680px; background: #0e0e0e; border-top: 1px solid #1a1a1a; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-end; z-index: 200; }
  .input-area textarea { flex: 1; background: #141414; border: 1px solid #252525; border-radius: 2px; padding: 10px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; outline: none; min-height: 44px; max-height: 120px; line-height: 1.5; transition: border-color 0.2s; }
  .input-area textarea:focus { border-color: #444; }
  .input-area textarea::placeholder { color: #333; }
  .send-btn { width: 44px; height: 44px; border-radius: 2px; background: #fff; border: none; color: #000; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; font-weight: 700; }
  .send-btn:hover { background: #ddd; }
  .send-btn:disabled { background: #1a1a1a; color: #333; cursor: default; }

  .pdf-wrap { display: flex; justify-content: center; padding: 16px 0 8px; }
  .pdf-btn { padding: 14px 44px; border-radius: 2px; border: 1px solid #fff; background: #fff; color: #000; font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; cursor: pointer; letter-spacing: 0.1em; transition: all 0.18s; }
  .pdf-btn:hover { background: #000; color: #fff; }

  .typing .bubble { display: flex; gap: 6px; align-items: center; padding: 14px 18px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; animation: bounce 1.2s infinite ease; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }
</style>
</head>

const TOTAL=QUESTIONS.length;

function scrollBot(){setTimeout(()=>chat.scrollTop=chat.scrollHeight,80);}
function fmt(t){return t.replace(/\*(.*?)\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function updateProgress(){
  const pct=Math.round((step/TOTAL)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-label').textContent=QUESTIONS[step-1]?.section||'Concluído';
}
function addDivider(l){const d=document.createElement('div');d.className='section-divider';d.textContent=l;chat.appendChild(d);}
function addBotMsg(h){const m=document.createElement('div');m.className='msg bot';m.innerHTML=`<div class="bubble">${h}</div><span class="time">${now()}</span>`;chat.appendChild(m);scrollBot();}
function addUserMsg(t){const m=document.createElement('div');m.className='msg user';m.innerHTML=`<div class="bubble">${t}</div><span class="time">${now()}</span>`;chat.appendChild(m);scrollBot();}
function addTyping(){const t=document.createElement('div');t.className='msg bot typing';t.id='typing';t.innerHTML=`<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;chat.appendChild(t);scrollBot();return t;}

function showQuestion(){
  if(step>=TOTAL){finish();return;}
  const q=QUESTIONS[step];
  if(q.section)addDivider(q.section);
  const tp=addTyping();
  setTimeout(()=>{
    tp.remove();addBotMsg(fmt(q.q));
    if(q.type==='text'){inputMode='text';txt.placeholder='Digite sua resposta...';txt.disabled=false;txt.focus();sendBtn.disabled=false;}
    else if(q.type==='single'){inputMode='single';txt.disabled=true;sendBtn.disabled=true;showOpts(q.opts,false);}
    else if(q.type==='multi'){inputMode='multi';txt.disabled=true;sendBtn.disabled=true;multiTemp=[];showOpts(q.opts,true);}
  },650);
}

function showOpts(opts,isMulti){
  const w=document.createElement('div');w.className='msg bot';
  const g=document.createElement('div');g.className='options';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt-btn'+(isMulti?' multi':'');b.textContent=o;
    b.onclick=()=>{
      if(!isMulti){document.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');setTimeout(()=>{record(o);cleanOpts();},280);}
      else{b.classList.toggle('selected');if(b.classList.contains('selected'))multiTemp.push(o);else multiTemp=multiTemp.filter(x=>x!==o);}
    };
    g.appendChild(b);
  });
  if(isMulti){const c=document.createElement('button');c.className='confirm-btn';c.textContent='Confirmar ✓';c.onclick=()=>{record(multiTemp.length?multiTemp.join(', '):'Nenhum');cleanOpts();};g.appendChild(c);}
  w.appendChild(g);chat.appendChild(w);scrollBot();
}
function cleanOpts(){document.querySelectorAll('.options').forEach(e=>e.parentElement.remove());}
function record(val){const q=QUESTIONS[step];answers[q.key]=val;addUserMsg(val);step++;updateProgress();setTimeout(showQuestion,380);}
function sendText(){const v=txt.value.trim();if(!v)return;txt.value='';txt.style.height='';txt.disabled=true;sendBtn.disabled=true;record(v);}
sendBtn.onclick=sendText;
txt.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}});
txt.addEventListener('input',()=>{txt.style.height='';txt.style.height=Math.min(txt.scrollHeight,120)+'px';});

function finish(){
  txt.disabled=true;sendBtn.disabled=true;document.getElementById('input-area').style.display='none';
  const tp=addTyping();
  setTimeout(()=>{
    tp.remove();
    addBotMsg('Briefing concluído com sucesso.\n\nTodas as informações foram registradas. Clique abaixo para gerar o *PDF de controle interno*.');
    const w=document.createElement('div');w.className='pdf-wrap';
    const b=document.createElement('button');b.className='pdf-btn';b.textContent='Gerar PDF';b.onclick=generatePDF;
    w.appendChild(b);chat.appendChild(w);scrollBot();
  },800);
}

function generatePDF(){
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=18,cW=W-M*2;
  let y=0;

  function chk(h=16){if(y+h>272){drawFtr(doc.internal.getNumberOfPages());doc.addPage();y=20;}}
  function drawFtr(pg){
    doc.setFillColor(0,0,0);doc.rect(0,282,W,15,'F');
    try{doc.addImage(LOGO,'PNG',M,284,18,8,'','FAST');}catch(e){}
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(100,100,100);
    doc.text(`Briefing Inicial — Uso Interno | ${new Date().toLocaleDateString('pt-BR')}`,M+22,290);
    doc.text(`Pág. ${pg}`,W-M,290,{align:'right'});
  }

  // HEADER
  doc.setFillColor(0,0,0);doc.rect(0,0,W,48,'F');
  try{doc.addImage(LOGO,'PNG',M,10,55,24,'','FAST');}catch(e){}
  doc.setDrawColor(255,255,255);doc.setLineWidth(0.3);doc.line(M+62,12,M+62,38);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(160,160,160);
  doc.text('BRIEFING INICIAL',M+68,20);
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
  doc.text('PROJETO DE ARQUITETURA',M+68,28);
  doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(120,120,120);
  doc.text(`${answers['nome_clientes']||'—'}   ·   ${answers['data']||'—'}`,M+68,36);
  doc.setFillColor(255,255,255);doc.rect(0,48,W,0.4,'F');
  y=60;

  const sections=[
    {title:'01 — INFORMAÇÕES GERAIS',keys:[['Data','data'],['Nome dos Clientes','nome_clientes'],['Telefones','telefones'],['E-mail','email'],['Endereço','endereco_imovel'],['Tipo do Imóvel','tipo_imovel'],['Posse','imovel_proprio'],['Estado','imovel_estado']]},
    {title:'02 — PERFIL DOS MORADORES',keys:[['Qtd. Pessoas','qtd_pessoas'],['Idades','idade_moradores'],['Crianças','criancas'],['Idosos','idosos'],['Pets','pets'],['Home Office','home_office'],['Nec. Especiais','necessidade_especial']]},
    {title:'03 — OBJETIVOS DO PROJETO',keys:[['Objetivos','objetivo_principal'],['O que incomoda','incômodo'],['Não pode faltar','nao_pode_faltar'],['Não quer','nao_quer']]},
    {title:'04 — ESTILO E REFERÊNCIAS',keys:[['Estilo','estilo'],['3 Palavras','tres_palavras'],['Referências','referencias'],['Tom','amb_tom'],['Cores','cores'],['Materiais','materiais']]},
    {title:'05 — PROGRAMA DE NECESSIDADES',keys:[['Itens a Incorporar','itens_incorporar']]},
    {title:'06 — COZINHA',keys:[['Tipo','coz_tipo'],['Frequência','coz_frequencia'],['Eletrodomésticos','coz_eletro'],['Itens','coz_extra'],['Cuba','coz_cuba'],['Água Quente','coz_agua'],['Cooktop','coz_cooktop'],['Combustível','coz_gas'],['Coifa','coz_coifa']]},
    {title:'07 — ÁREA DE SERVIÇO',keys:[['Máq. Lavar','serv_maq_tipo'],['Tanque','serv_tanque'],['Varais','serv_varais'],['Extras','serv_extras']]},
    {title:'08 — BANHEIROS',keys:[['Quantidade','banho_qtd'],['Itens','banho_itens'],['Água Quente','banho_agua']]},
    {title:'09 — SALA',keys:[['Móveis Antigos','sala_movel'],['Itens','sala_extras'],['Desejos','sala_desejo']]},
    {title:'10 — QUARTO PRINCIPAL',keys:[['Móveis Antigos','qp_movel'],['Cama','qp_cama'],['Guarda-roupa','qp_guarda'],['Extras','qp_extras'],['Desejos','qp_desejo']]},
    {title:'11 — QUARTO ADICIONAL',keys:[['Cômodo','q2_nome'],['Cama','q2_cama'],['Desejos','q2_desejo']]},
    {title:'12 — ESCRITÓRIO / HOME OFFICE',keys:[['Reforma','esc_tem'],['Posições','esc_posicoes'],['Itens','esc_itens'],['Desejos','esc_desejo']]},
    {title:'13 — ORÇAMENTOS E PRAZOS',keys:[['Orçamento','orcamento'],['Valor','orcamento_valor'],['Prioridade','prioridade_custo'],['Prazo','prazo'],['Data Importante','data_importante']]},
    {title:'14 — OPERACIONAL DA OBRA',keys:[['Acompanhamento','acompanhamento'],['Tolerância','tolerancia']]},
    {title:'15 — TOMADA DE DECISÕES',keys:[['Responsável','decisor'],['Influentes','influentes'],['Autonomia','autonomia']]},
    {title:'16 — EXPECTATIVAS',keys:[['Expectativas','expectativas'],['Exp. Anterior','exp_anterior'],['Como foi','exp_anterior_desc'],['Receios','receios']]},
    {title:'17 — INFORMAÇÕES FINAIS',keys:[['Restrição Cond.','restricao_cond'],['Outros','outros']]},
  ];

  sections.forEach(sec=>{
    chk(14);
    doc.setFillColor(0,0,0);doc.rect(M,y,cW,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(255,255,255);
    doc.text(sec.title,M+3,y+5);
    y+=10;
    sec.keys.forEach(([label,key],i)=>{
      const raw=answers[key]||'—';
      const lines=doc.splitTextToSize(raw,cW-50);
      const rh=Math.max(7,lines.length*5.5+2);
      chk(rh+1);
      if(i%2===0){doc.setFillColor(246,246,246);doc.rect(M,y-1,cW,rh+1,'F');}
      doc.setDrawColor(225,225,225);doc.rect(M,y-1,cW,rh+1,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(130,130,130);
      doc.text(label,M+2,y+4.5);
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(0,0,0);
      doc.text(lines,M+50,y+4.5);
      y+=rh+1;
    });
    y+=5;
  });

  drawFtr(doc.internal.getNumberOfPages());
  const nome=(answers['nome_clientes']||'cliente').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  const data=(answers['data']||'').replace(/\//g,'-');
  doc.save(`briefing_${nome}_${data}.pdf`);
}

window.onload=()=>{updateProgress();setTimeout(showQuestion,500);};
</script>
